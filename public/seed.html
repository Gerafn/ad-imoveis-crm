<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Carregando dados...</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f0f4f8; }
    .box { background: white; border-radius: 16px; padding: 40px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.1); max-width: 400px; }
    h2 { color: #1B4F72; margin: 0 0 12px; }
    p { color: #64748b; font-size: 14px; }
    .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #1B4F72; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success { color: #16a34a; font-size: 24px; margin-bottom: 12px; }
    a { color: #1B4F72; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
  <div class="box" id="box">
    <div class="spinner"></div>
    <h2>Carregando dados da planilha...</h2>
    <p>Aguarde um momento.</p>
  </div>
  <script>
    fetch('/seed-data.json')
      .then(r => r.json())
      .then(data => {
        localStorage.setItem('crm_leads', JSON.stringify(data.crm_leads))
        localStorage.setItem('crm_owners', JSON.stringify(data.crm_owners))
        localStorage.setItem('crm_goals', JSON.stringify(data.crm_goals))
        localStorage.setItem('crm_seed_loaded', '1')

        document.getElementById('box').innerHTML = `
          <div class="success">✅</div>
          <h2>Dados carregados!</h2>
          <p>${data.crm_leads.length} leads · ${data.crm_owners.length} proprietários</p>
          <br>
          <a href="/">Abrir o CRM →</a>
        `
      })
      .catch(e => {
        document.getElementById('box').innerHTML = `
          <h2 style="color:#ef4444">Erro</h2>
          <p>${e.message}</p>
        `
      })
  </script>
</body>
</html>
